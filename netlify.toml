# PearlSmile Dental — Netlify Configuration
# Drop the entire folder onto Netlify to deploy instantly.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/privacy"
  to = "/pages/privacy-policy.html"
  status = 301

[[redirects]]
  from = "/gallery"
  to = "/pages/gallery.html"
  status = 301

[[redirects]]
  from = "/smile-stories"
  to = "/pages/smile-stories.html"
  status = 301
